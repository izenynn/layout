;
;;  ================================================================================================================================================
;;  Layout Definition file
;;  for EPiKaL Portable Keyboard Layout (EPKL) by Øystein "DreymaR" Bech-Aase (2015-), based on PKL by Máté Farkas (2008-2010).
;
;;  - The Layout.ini file may point to a BaseLayout as well as Extend/DeadKey/Compose/etc table files.
;;  - It can override BaseLayout, EPKL_Layouts_Override and EPKL_Layouts mappings, add key (re)maps and other layout info.
;;  - It, in turn, can be overridden by a Layout_Override user file located in the same layout folder as itself.
;;  - To select a layout, you can use the Layout/Settings dialog from the EPKL tray menu (or Ctrl+Shift+6).
;;  - A more low-level way is to edit the EPKL_Layouts(_Override) 'layout = ' line and/or Type/Mod/ID/etc entries directly.
;;  - Alternatively, run EPKL in compactMode with the layout's files directly inside the main program folder.
;;  ================================================================================================================================================
;
;;  Base Layout file info:
;;  - This file defines a useable layout in the EPKL format.
;;  - It is pointed to and overridden by Layout.ini files for key remaps, mapping overrides etc.
;;  - Any BaseLayout file may in turn point to and override another, in a BaseStack.
;

[information]
layoutName      = NokwtsPlusPlus-eD ANSI
layoutCode      = NokwtsPP-eD-ANS
localeID        = 00000409

copyright       = izenynn
company         = izenynn
homepage        = https://github.com/izenynn
version         = v1.0, 2026-02

[pkl]
;;  A layout may augment its base one. The Remap file contains ergo and other layout remaps.
;;  The Extend/dkList/string files hold Extend, dead key and literal/PowerString definitions.
;baseLayout      = Colemak\BaseLayout_Cmk-eD
;remapsFile      = Files\_eD_Remap.ini
;extendFile      = Files\_eD_Extend.ini
;dkListFile      = Files\_eD_DeadKeys.ini
;stringFile      = Files\_eD_PwrStrings.ini
;cmposrFile      = Files\_eD_Compose.ini

;;  The "layout/soft" ScanCode map is for typing, the "extend/hard" one for Extend mappings.
;;  The "mechanical layout" VirtualKey map is mainly for ANS(I)/ISO/JIS conversion.
;;  NokwtsPlusPlus has Wide mod built into its base layout, so no ergo remaps are needed.
;mapSC_layout    = AWide_@K  					; Angle_@K, AWide_@K, Cmk-CAW-_@K etc - see _eD_Remap.ini
;mapSC_extend    = AWide_@K  					; Only "hard" (non-letter) mods. Extend Curl-DH moves Ext+V with V.

;;  DreymaR's IBM-style help images @96dpi (1u/r = 54,56 px: 15u/5r = 812,282; 13u/4r = 704,226)
img_sizeWH      = 812,282
;;  Scaling factor for help images, in %. (96->64)dpi = 66.66%; (96->48)dpi = 50%
img_scale       = 100

;;  Background image (key caps etc) and a background color for the image panel
img_bgImage     = Files\ImgBackground\Bg_Nice-Tinted_@K.png
;;  On/Off, Extend, Dead key and Shift state marker (e.g., MagBlob, GrnBlob) images
icons_OnOff     = Files\ImgIcons\Co-5_
img_Extend1     = Files\ImgExtend\@K_Ext1.png
img_Extend2     = Files\ImgExtend\@K_Ext2.png
img_Extend3     = Files\ImgExtend\@K_Ext3.png
img_Extend4     = Files\ImgExtend\_Empty_Ext.png
img_ModsDir     = Files\ImgModStates\GrnBlob

[fingers]
;;  This section is not used by EPKL, but a PKL Perl script used it to determine fingering colors.
;row1 = 112334 5567888	; Num   ` 9 3 1 5 7   \ 6 2 0 4  8 =
;row2 = 112344 5567888	; Top   → z m r l f   [ j y o u  _ /
;row3 = 112344 5567888	; Hom   ↑ n t h s b   ] c d e i  a '
;row4 = 112344 55678 9	; Low   _ x q w k v   < p g , .

[layout]
;;  - These mappings override any key mappings in the _Layouts_ files.
;;  - They may in turn be overridden by mappings in the current Layout.ini file.
;
shiftStates    =			0	:	1	:	2	:	6	:	7		;	8	:	9	:	e	:	f
;; SC = VKEY    	CStat	Base	Shift	Ctrl	AltGr	AGrSh	;	SwiSh	SwShS	SwAGr	SwAGS

;;  	| 9 3 1 5 7   \ 6 2 0 4  8 = |  	; NokwtsPlusPlus Number Row
QW_GR = vc_GR   	0   	`   	~   	--  	--  	--  	; NktPP `~
QW_1  = 9       	0   	9   	(   	--  	--  	--  	; NktPP 9(
QW_2  = 3       	0   	3   	#   	--  	--  	--  	; NktPP 3#
QW_3  = 1       	0   	1   	!   	--  	--  	--  	; NktPP 1!
QW_4  = 5       	0   	5   	%   	--  	--  	--  	; NktPP 5%
QW_5  = 7       	0   	7   	&   	--  	--  	--  	; NktPP 7&
QW_6  = vc_BS   	0   	\   	|   	--  	--  	--  	; NktPP \| (ANS/ISO _5/_2)
QW_7  = 6       	0   	6   	^   	--  	--  	--  	; NktPP 6^
QW_8  = 2       	0   	2   	@   	--  	--  	--  	; NktPP 2@
QW_9  = 0       	0   	0   	)   	--  	--  	--  	; NktPP 0)
QW_0  = 4       	0   	4   	$   	--  	--  	--  	; NktPP 4$
QW_MN = 8       	0   	8   	*   	--  	--  	--  	; NktPP 8*
QW_PL = vc_PL   	0   	=   	+   	--  	--  	--  	; NktPP =+ (ANS/ISO _PLUS/_4)

;;  	| z m r l f   [ j y o u  _ / |  	; NokwtsPlusPlus Upper Row
QW_Q  = Z       	1   	z   	Z   	--  	'   	--  	; NktPP zZ, AltGr: '
QW_W  = M       	1   	m   	M   	--  	<   	--  	; NktPP mM, AltGr: <
QW_E  = R       	1   	r   	R   	--  	>   	--  	; NktPP rR, AltGr: >
QW_R  = L       	1   	l   	L   	--  	"   	--  	; NktPP lL, AltGr: "
QW_T  = F       	1   	f   	F   	--  	#   	--  	; NktPP fF, AltGr: #
QW_Y  = vc_LB   	0   	[   	{   	&Esc	--  	--  	; NktPP [{ (ANS/ISO _4/_6)
QW_U  = J       	1   	j   	J   	--  	$   	--  	; NktPP jJ, AltGr: $
QW_I  = Y       	1   	y   	Y   	--  	→:: 	--  	; NktPP yY, AltGr: :: (ligature)
QW_O  = O       	1   	o   	O   	--  	[   	--  	; NktPP oO, AltGr: [
QW_P  = U       	1   	u   	U   	--  	]   	--  	; NktPP uU, AltGr: ]
QW_LB = vc_MN   	0   	_   	-   	--  	%   	--  	; NktPP _- (ANS/ISO _MINUS/_PLUS), AltGr: %
QW_RB = vc_SL   	0   	/   	?   	--  	@   	--  	; NktPP /? (ANS/ISO _2/_MINUS), AltGr: @

;;  	| n t h s b   ] c d e i  a ' |  	; NokwtsPlusPlus Home Row
QW_A  = N       	1   	n   	N   	--  	!   	--  	; NktPP nN, AltGr: !
QW_S  = T       	1   	t   	T   	--  	-   	--  	; NktPP tT, AltGr: -
QW_D  = H       	1   	h   	H   	--  	+   	--  	; NktPP hH, AltGr: +
QW_F  = S       	1   	s   	S   	--  	=   	--  	; NktPP sS, AltGr: =
QW_G  = B       	1   	b   	B   	--  	_   	--  	; NktPP bB, AltGr: _
QW_H  = vc_RB   	0   	]   	}   	--  	--  	--  	; NktPP ]} (ANS/ISO _6/_1)
QW_J  = C       	1   	c   	C   	--  	|   	--  	; NktPP cC, AltGr: |
QW_K  = D       	1   	d   	D   	--  	→-> 	--  	; NktPP dD, AltGr: -> (ligature)
QW_L  = E       	1   	e   	E   	--  	(   	--  	; NktPP eE, AltGr: (
QW_SC = I       	1   	i   	I   	--  	)   	--  	; NktPP iI, AltGr: )
QW_QU = A       	5   	a   	A   	--  	?   	¿   	; NktPP aA, SGCap: AltGr ?¿
QW_BS = vc_QU   	4   	'   	"   	--  	ñ   	Ñ   	; NktPP '", AltGr: ñÑ

;;  	| x q w k v   < p g , .      |  	; NokwtsPlusPlus Lower Row
;QW_LG = vc_LG   	5   	œ   	Œ   	--  	ø   	Ø   	; US <> -eD ## (ISO OEM_102)
QW_Z  = X       	1   	x   	X   	--  	^   	--  	; NktPP xX, AltGr: ^
QW_X  = Q       	1   	q   	Q   	--  	/   	--  	; NktPP qQ, AltGr: /
QW_C  = W       	1   	w   	W   	--  	*   	--  	; NktPP wW, AltGr: *
QW_V  = K       	1   	k   	K   	--  	\   	--  	; NktPP kK, AltGr: \
QW_B  = V       	1   	v   	V   	--  	→../	--  	; NktPP vV, AltGr: ../ (ligature)
QW_N  = vc_SC   	0   	<   	>   	--  	--  	--  	; NktPP <> (ANS/ISO _1/_3)
QW_M  = P       	1   	p   	P   	--  	~   	--  	; NktPP pP, AltGr: ~
QW_CM = G       	1   	g   	G   	--  	&   	--  	; NktPP gG, AltGr: &
QW_PD = vc_CM   	0   	,   	;   	--  	{   	--  	; NktPP ,; (ANS/ISO OEM_COMMA), AltGr: {
QW_SL = vc_PD   	0   	.   	:   	--  	}   	--  	; NktPP .: (ANS/ISO OEM_PERIOD), AltGr: }
QWSPC = SPACE   	0   	Spc 	Spc 	--  	Spc 	    	; Space

;;  *** CapsLock ↔ Backspace swap: Full key swap for NokwtsPlusPlus
QWCLK = BACK    	VKey 											; SC03a: CapsLock → Backspace (with key repeat)
QWBSP = CAPITAL 	VKey 											; SC00e: Backspace → CapsLock
